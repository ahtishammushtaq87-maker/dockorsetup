name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ ahtisham109 }}
          password: ${{ aht47ar@ }}

      - name: Build image
        run: docker build -t ahtisham109/my-react-app .

      - name: Push image
        run: docker push ahtisham109/my-react-app
